<nav class="site-nav" role="navigation" aria-label="Main">
  <div class="nav-inner">
    <a class="nav-brand" href="{{ .Site.BaseURL }}">
      <img src="{{ "images/spyglass-icon.webp" | relURL }}" alt="" width="32" height="32" loading="eager">
      <span>Spyglass</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      {{ range .Site.Menus.main }}
      <li><a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
    </ul>
  </div>
</nav>
<script>
(function(){
  var b=document.querySelector('.nav-toggle'),m=document.querySelector('.nav-links');
  b.addEventListener('click',function(){
    var open=m.classList.toggle('open');
    b.classList.toggle('open',open);
    b.setAttribute('aria-expanded',open);
  });
})();
</script>
