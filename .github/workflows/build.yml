name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > app/release.jks

      - name: Write signing properties
        run: |
          echo "RELEASE_STORE_FILE=release.jks" >> local.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> local.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> local.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> local.properties
          echo "ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }}" >> local.properties
          echo "ADMOB_BANNER_ID=${{ secrets.ADMOB_BANNER_ID }}" >> local.properties

      - name: Generate build timestamp
        id: ts
        run: |
          YEAR=$(TZ='America/Chicago' date +'%Y')
          declare -A ZODIAC=(
            [2024]=WoodDragon [2025]=WoodSnake
            [2026]=FireHorse [2027]=FireGoat
            [2028]=EarthMonkey [2029]=EarthRooster
            [2030]=MetalDog [2031]=MetalPig
            [2032]=WaterRat [2033]=WaterOx
            [2034]=WoodTiger [2035]=WoodRabbit
          )
          NAME=${ZODIAC[$YEAR]}
          STAMP="${NAME}.$(TZ='America/Chicago' date +'%m%d.%H%M')"
          echo "stamp=${STAMP}" >> "$GITHUB_OUTPUT"
          echo "tag=${STAMP}-a" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          BUILD_TIMESTAMP: ${{ steps.ts.outputs.stamp }}

      - name: Build release AAB
        run: ./gradlew bundleRelease
        env:
          BUILD_TIMESTAMP: ${{ steps.ts.outputs.stamp }}

      - name: Decode Play service account
        if: ${{ env.HAS_PLAY_KEY == 'true' }}
        run: echo "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}" | base64 -d > play-service-account.json
        env:
          HAS_PLAY_KEY: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}

      - name: Publish AAB to Google Play (internal)
        if: ${{ env.HAS_PLAY_KEY == 'true' }}
        run: |
          echo "PLAY_SERVICE_ACCOUNT_JSON=play-service-account.json" >> local.properties
          ./gradlew publishReleaseBundle
        env:
          HAS_PLAY_KEY: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}

      - name: Generate release tag
        id: tag
        run: echo "tag=${{ steps.ts.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Spyglass ${{ steps.tag.outputs.tag }}
          body: |
            Release build from `main` — ${{ github.sha }}

            **APK** — download `app-release.apk` and sideload on your Android device.
            **AAB** — download `app-release.aab` for Google Play Store upload.
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
