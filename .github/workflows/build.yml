name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > app/release.jks

      - name: Write signing properties
        run: |
          cat >> local.properties <<EOF
          RELEASE_STORE_FILE=release.jks
          RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}
          ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_ID=${{ secrets.ADMOB_BANNER_ID }}
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Build release AAB
        run: ./gradlew bundleRelease

      - name: Decode Play service account
        if: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        run: echo "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}" | base64 -d > play-service-account.json

      - name: Publish AAB to Google Play (internal)
        if: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        run: |
          echo "PLAY_SERVICE_ACCOUNT_JSON=play-service-account.json" >> local.properties
          ./gradlew publishReleaseBundle

      - name: Generate release tag
        id: tag
        run: echo "tag=v$(TZ='America/Chicago' date +'%Y.%m%d.%H%M')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Spyglass ${{ steps.tag.outputs.tag }}
          body: |
            Release build from `main` — ${{ github.sha }}

            **APK** — download `app-release.apk` and sideload on your Android device.
            **AAB** — download `app-release.aab` for Google Play Store upload.
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
